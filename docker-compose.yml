version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: input_service/Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-120}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      LIVE_CAPTURE_SECONDS: ${LIVE_CAPTURE_SECONDS:-120}
    ports:
      - "8000:8000"
    volumes:
      - ./input_service/var:/app/input_service/var

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api
